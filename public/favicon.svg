<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8A65;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF5722;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Subtle shine overlay -->
  <rect width="512" height="256" rx="108" fill="url(#shine)"/>
  <!-- Math symbols arranged in a grid -->
  <text x="140" y="210" font-family="Arial,Helvetica,sans-serif" font-size="160" font-weight="900" fill="#ffffff" opacity="1">+</text>
  <text x="290" y="210" font-family="Arial,Helvetica,sans-serif" font-size="160" font-weight="900" fill="#ffffff" opacity="0.7">−</text>
  <text x="140" y="400" font-family="Arial,Helvetica,sans-serif" font-size="160" font-weight="900" fill="#ffffff" opacity="0.7">×</text>
  <text x="290" y="400" font-family="Arial,Helvetica,sans-serif" font-size="160" font-weight="900" fill="#ffffff" opacity="0.5">÷</text>
  <!-- Accent dots -->
  <circle cx="90" cy="80" r="18" fill="#FFF176" opacity="0.8"/>
  <circle cx="430" cy="440" r="24" fill="#4FC3F7" opacity="0.7"/>
  <circle cx="440" cy="80" r="14" fill="#81C784" opacity="0.8"/>
  <circle cx="80" cy="430" r="10" fill="#E1BEE7" opacity="0.7"/>
</svg>
